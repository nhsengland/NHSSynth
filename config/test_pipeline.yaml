seed: 1
experiment_name: test
run_type: pipeline
dataloader:
  collapse_yaml: true
  write_csv: true
model:
  architecture:
    - DPVAE
  num_epochs:
    - 50
  patience: 10
  target_epsilon:
    - 1.0
  max_grad_norm: 5.0
  secure_mode: false
  repeats: 1
  # GAN example (replace architecture above with one of these):
  # architecture: [GAN]
  # noise_dim: 128
  # n_critic: 5  # critic steps per generator step (not yet exposed; set via n_units_conditional)
  # lambda_gradient_penalty: 10
  # generator_n_layers_hidden: 2
  # generator_n_units_hidden: 250
  # discriminator_n_layers_hidden: 3
  # discriminator_n_units_hidden: 300
  #
  # DPGAN example:
  # architecture: [DPGAN]
  # target_epsilon: 3.0
  # max_grad_norm: 5.0
evaluation:
  # Downstream tasks and fairness
  downstream_tasks: true
  fairness: true
  protected_attributes:
    - x1
    - x3

  # Column Shape Metrics
  column_shape_metrics:
    - KSComplement
    - TVComplement

  # Column Similarity Metrics
  column_similarity_metrics:
    - MissingValueSimilarity
    - StatisticSimilarity
    - CorrelationSimilarity
    - ContingencySimilarity

  # Boundary Metrics
  boundary_metrics:
    - BoundaryAdherence

  # Coverage Metrics
  coverage_metrics:
    - RangeCoverage
    - CategoryCoverage

  # Synthesis Metrics
  synthesis_metrics:
    - NewRowSynthesis

  # Divergence Metrics
  divergence_metrics:
    - ContinuousKLDivergence
    - DiscreteKLDivergence

  # Privacy Metrics - Categorical
  # Key fields: attributes that could identify someone (quasi-identifiers)
  # Sensitive fields: attributes we want to protect
  key_categorical_fields:
    - x1
  sensitive_categorical_fields:
    - event
  cap_privacy_metrics:
    - CategoricalCAP
    - CategoricalGeneralizedCAP
    - CategoricalZeroCAP
  categorical_privacy_metrics:
    - CategoricalKNN
    - CategoricalNB
    - CategoricalRF
    - CategoricalSVM
    - CategoricalEnsemble

  # Privacy Metrics - Numerical
  key_numerical_fields:
    - x7
  sensitive_numerical_fields:
    - x12
  numerical_privacy_metrics:
    - NumericalLR
    - NumericalMLP
    - NumericalSVR
    - NumericalRadiusNearestNeighbor
